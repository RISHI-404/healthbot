services:
  # Backend Service (FastAPI on Render)
  - type: web
    name: healthcare-chatbot-backend
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.prod.txt
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LOCAL_AI_ENABLED
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: SQLITE_FALLBACK
        value: false
      - key: CORS_ORIGINS
        value: "https://healthbot-nine.vercel.app,http://localhost:5173"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: AES_ENCRYPTION_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: NVIDIA_API_KEY
        sync: false  # Must enter in Render dashboard

databases:
  - name: healthcare-db
    plan: free
    databaseName: healthbot
    user: healthbot_user

version: "1"
